server:
  port: 8090
  servlet:
    context-path: /

spring:
  application:
    name: concert-ticket

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/concert_ticket?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: ConcertHikariCP

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password:  # 如有密码请填写
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: -1ms

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.concert.entity
  type-enums-package: com.concert.enums
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境打印SQL，生产环境可注释
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag  # 全局逻辑删除字段名
      logic-delete-value: 1        # 逻辑已删除值
      logic-not-delete-value: 0    # 逻辑未删除值
      insert-strategy: not_null
      update-strategy: not_null
    banner: false

# JWT 配置
jwt:
  secret: ConcertTicketSecretKey2024!@#$%^&*()_+ABCDEFGHIJKLMNOPQRSTUVWXYZ
  expiration: 86400000  # 24小时，单位毫秒
  header: Authorization
  prefix: Bearer

# 阿里云短信配置
aliyun:
  sms:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}       # 阿里云 AccessKey ID
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}  # 阿里云 AccessKey Secret
    sign-name: ${ALIYUN_SMS_SIGN_NAME:}           # 短信签名
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}   # 短信模板编码
    region-id: cn-hangzhou

# 日志配置
logging:
  level:
    root: info
    com.concert: debug
    com.concert.mapper: debug  # 打印 SQL
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/concert-ticket.log
    max-size: 10MB
    max-history: 30

# 演唱会订票系统自定义配置
concert:
  # 订单配置
  order:
    expire-minutes: 15  # 订单超时时间（分钟）
    max-tickets-per-order: 4  # 单笔订单最大购票数
    refund-before-hours: 48  # 退款截止时间（演出前多少小时可退）
  # 验证码配置
  captcha:
    expire-minutes: 5  # 验证码过期时间（分钟）
  # 分页配置
  page:
    max-size: 100  # 分页大小上限
    default-size: 10  # 分页大小默认值
